name: Deploy website preview to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply synchronized website update
        if: ${{ hashFiles('update.patch.gz.b64') != '' }}
        run: |
          base64 --decode update.patch.gz.b64 | gzip -d > /tmp/masm-update.patch
          git apply /tmp/masm-update.patch
          rm update.patch.gz.b64
          cat > .github/workflows/pages.yml <<'WORKFLOW'
          name: Deploy website preview to GitHub Pages

          on:
            push:
              branches: ["main"]
            workflow_dispatch:

          permissions:
            contents: read
            pages: write
            id-token: write

          concurrency:
            group: pages
            cancel-in-progress: true

          jobs:
            build:
              runs-on: ubuntu-latest
              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Set up Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm

                - name: Set up Pages
                  uses: actions/configure-pages@v5
                  with:
                    enablement: true

                - name: Install dependencies
                  run: npm ci

                - name: Build static website
                  env:
                    PAGES_BASE_PATH: /masm-website
                    NEXT_PUBLIC_BASE_PATH: /masm-website
                  run: npm run build

                - name: Upload website
                  uses: actions/upload-pages-artifact@v3
                  with:
                    path: ./out

            deploy:
              environment:
                name: github-pages
                url: ${{ steps.deployment.outputs.page_url }}
              runs-on: ubuntu-latest
              needs: build
              steps:
                - name: Deploy to GitHub Pages
                  id: deployment
                  uses: actions/deploy-pages@v4
          WORKFLOW
          git config user.name "sianmatti"
          git config user.email "sianmatti11@gmail.com"
          git add -A
          git commit -m "Apply MASM design and conversion updates"
          git push origin HEAD:main

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build static website
        env:
          PAGES_BASE_PATH: /masm-website
          NEXT_PUBLIC_BASE_PATH: /masm-website
        run: npm run build

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
